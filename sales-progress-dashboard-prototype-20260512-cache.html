<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아워박스 세일즈 대시보드 캐시 버전</title>
  <style>
    body{margin:0;background:#f4f6f9;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
    .boot{min-height:100vh;display:grid;place-items:center}
    .card{background:#fff;border:1px solid #dde3ea;border-radius:12px;padding:22px 26px;box-shadow:0 8px 24px rgba(16,32,51,.06);text-align:center}
    .title{font-weight:900;margin-bottom:8px}.sub{font-size:13px;color:#687386}
  </style>
</head>
<body>
<div class="boot"><div class="card"><div class="title">캐시 대시보드 로딩 중</div><div class="sub">요약 캐시 응답으로 새 화면을 준비합니다.</div></div></div>
<script>
(async function(){
  function patch(s,p,r,n){var x=s.replace(p,r); if(x===s) throw new Error('패치 실패: '+n); return x}
  var res=await fetch('sales-progress-dashboard-prototype-20260512.html?v='+Date.now(),{cache:'no-store'});
  if(!res.ok) throw new Error('원본 HTML 로드 실패: HTTP '+res.status);
  var html=await res.text();
  html=patch(html,/<title>[\s\S]*?<\/title>/,'<title>아워박스 세일즈 대시보드 캐시 버전</title>','title');
  html=patch(html,/step="1000000"/,'step="100000"','target step');
  html=patch(html,/let ALL=\[\], charts=\{\}, activeIssue='channelUnmapped', currentPage='overview';/,"let RAW_ROWS=[], ALL=[], PRODUCT_CACHE=[], QUALITY_ROWS=[], DATA_MODE='orders', charts={}, activeIssue='channelUnmapped', currentPage='overview';",'state');
  html=patch(html,/function daysBetween\(a,b\)\{return Math\.max\(0,Math\.round\(\(asDate\(b\)-asDate\(a\)\)\/86400000\)\+1\)\}\s*function dateList\(a,b\)\{let out=\[\], n=daysBetween\(a,b\); for\(let i=0;i<n;i\+\+\)out\.push\(addDays\(a,i\)\); return out\}/,
    "function validDateValue(s){return /^\\d{4}-\\d{2}-\\d{2}$/.test(String(s||''))&&!isNaN(asDate(s).getTime())}\n"+
    "function daysBetween(a,b){if(!validDateValue(a)||!validDateValue(b))return 0;return Math.max(0,Math.round((asDate(b)-asDate(a))/86400000)+1)}\n"+
    "function dateList(a,b){let out=[],n=daysBetween(a,b);if(!Number.isFinite(n)||n<=0)return out;n=Math.min(n,370);for(let i=0;i<n;i++)out.push(addDays(a,i));return out}\n"+
    "function dataBounds(){let ds=ALL.map(r=>r.date).filter(validDateValue).sort();return {min:ds[0]||'2026-01-01',max:ds.at(-1)||formatDate(new Date())}}\n"+
    "function clampDateInput(id,b){let el=$(id),v=el.value;if(!validDateValue(v))return false;if(v<b.min)el.value=b.min;if(v>b.max)el.value=b.max;return true}\n"+
    "let dateRenderTimer=null",'safe date');
  html=patch(html,/function orderCount\(rows\)\{return new Set\(rows\.map\(r=>r\.id\)\)\.size\}/,
    "function orderCount(rows){return rows.some(r=>r.orders!==undefined)?sum(rows,'orders'):new Set(rows.map(r=>r.id).filter(Boolean)).size}\n"+
    "const SALES_2025_MONTHLY={1:238637371,2:149753221,3:213941981,4:150920984,5:260814388,6:140060161,7:182631389,8:205383873,9:303100000,10:268800000,11:295090000,12:345090000};\n"+
    "const QUARTER_MONTHLY_TARGET={1:290407733,2:348489280,3:418187136,4:501824563};\n"+
    "function daysInMonthParts(y,m){return new Date(y,m,0).getDate()}\n"+
    "function quarterOfMonth(m){return Math.floor((m-1)/3)+1}\n"+
    "function round100k(n){return Math.max(0,Math.round((n||0)/100000)*100000)}\n"+
    "function fixed2025RevenueForRange(a,b){let total=0;dateList(a,b).forEach(d=>{let m=Number(d.slice(5,7));total+=(SALES_2025_MONTHLY[m]||0)/daysInMonthParts(2025,m)});return Math.round(total)}\n"+
    "function fixedTargetForRange(a,b){let total=0;dateList(a,b).forEach(d=>{let m=Number(d.slice(5,7)),q=quarterOfMonth(m);total+=(QUARTER_MONTHLY_TARGET[q]||0)/daysInMonthParts(Number(d.slice(0,4)),m)});return round100k(total)}\n"+
    "function cleanCacheRow(r){return {sheetRow:NUM(r.sheetRow),id:String(r.id||r.orderId||''),item:r.item||r.itemName||'',qty:NUM(r.qty||r.quantity),revenue:NUM(r.revenue||r.sales),ship:NUM(r.ship),shop:r.shop||r.shopName||'',date:parseDate(r.date||r.orderDate),channel:r.channel||r.channelGroup||'미매핑',product:r.product||r.stdProduct||r.item||r.itemName||'',category:r.category||'미매핑',settlement:NUM(r.settlement),cost:NUM(r.cost),shipCost:NUM(r.shipCost),margin:NUM(r.margin),manager:r.manager||'미지정',orders:NUM(r.orders||r.orderCount||r.count)}}\n"+
    "function buildBaseCache(rows){let m=new Map();rows.forEach(r=>{let key=[r.date,r.channel,r.category,r.manager].join('|||');if(!m.has(key))m.set(key,{date:r.date,channel:r.channel,category:r.category,manager:r.manager,qty:0,revenue:0,settlement:0,cost:0,shipCost:0,margin:0,orders:0,_ids:new Set()});let o=m.get(key);o.qty+=r.qty||0;o.revenue+=r.revenue||0;o.settlement+=r.settlement||0;o.cost+=r.cost||0;o.shipCost+=r.shipCost||0;o.margin+=r.margin||0;if(r.id)o._ids.add(r.id)});return [...m.values()].map(o=>{o.orders=o._ids.size;delete o._ids;return o})}\n"+
    "function normalizeApiResponse(json){let cache=json&&!Array.isArray(json)?(json.dashboardCache||json.cache||json.summary):null;if(cache&&Array.isArray(cache.baseRows)){RAW_ROWS=[];ALL=cache.baseRows.map(cleanCacheRow).filter(r=>r.date);PRODUCT_CACHE=(cache.productRows||[]).map(cleanCacheRow).filter(r=>r.date);QUALITY_ROWS=(cache.qualityRows||[]).map(cleanCacheRow).filter(r=>r.date);DATA_MODE='server-cache';return}let src=Array.isArray(json)?json:(json.orders||json.data||json.rows||[]);RAW_ROWS=src.map(clean).filter(r=>r.id&&r.date);ALL=buildBaseCache(RAW_ROWS);PRODUCT_CACHE=[];QUALITY_ROWS=[];DATA_MODE='client-cache'}",'helpers');
  html=patch(html,/function targetKey\(\)\{return 'ourboxTargetRange:'\+rangeKey\(\)\}/,"function targetKey(){return 'ourboxTargetRangeV2:'+rangeKey()}",'target key');
  html=patch(html,/function computedTarget\(\)\{let pr=prevRange\(\), prev=sum\(sameFilterRows\(pr\.from,pr\.to\),'revenue'\), cur=sum\(filtered\(\),'revenue'\), base=prev\?prev\*1\.08:cur\*1\.2; return Math\.max\(0,Math\.round\(base\/1000000\)\*1000000\)\}/,"function computedTarget(){return fixedTargetForRange($('dateFrom').value,$('dateTo').value)}",'target');
  html=patch(html,/function applyTarget\(\)\{let saved=localStorage\.getItem\(targetKey\(\)\); \$\('targetInput'\)\.value=saved===null\?computedTarget\(\):NUM\(saved\); \$\('targetSource'\)\.textContent=saved===null\?'전월 동기간 기준 자동 목표':'브라우저 저장 목표'\}/,"function applyTarget(){let saved=localStorage.getItem(targetKey());$('targetInput').value=saved===null?computedTarget():NUM(saved);$('targetSource').textContent=saved===null?'분기 성장 목표 자동 목표':'브라우저 저장 목표'}",'apply target');
  html=patch(html,/function handleDateChange\(\)\{if\(\$\('dateFrom'\)\.value>\$\('dateTo'\)\.value\)\{let t=\$\('dateFrom'\)\.value; \$\('dateFrom'\)\.value=\$\('dateTo'\)\.value; \$\('dateTo'\)\.value=t\} refreshFilterOptions\(\); applyTarget\(\); renderAll\(\)\}/,"function handleDateChange(){clearTimeout(dateRenderTimer);dateRenderTimer=setTimeout(()=>{let b=dataBounds();if(!clampDateInput('dateFrom',b)||!clampDateInput('dateTo',b))return;if($('dateFrom').value>$('dateTo').value){let t=$('dateFrom').value;$('dateFrom').value=$('dateTo').value;$('dateTo').value=t}if(daysBetween($('dateFrom').value,$('dateTo').value)>370){$('dateFrom').value=addDays($('dateTo').value,-369)}refreshFilterOptions();applyTarget();renderAll()},120)}",'date change');
  html=patch(html,/function filtered\(\)\{let ch=\$\('channelFilter'\)\.value,cat=\$\('categoryFilter'\)\.value,mgr=\$\('managerFilter'\)\.value; return ALL\.filter\(r=>inDateRange\(r\)&&\(ch==='ALL'\|\|r\.channel===ch\)&&\(cat==='ALL'\|\|r\.category===cat\)&&\(mgr==='ALL'\|\|r\.manager===mgr\)\)\}/,"function filtered(){let ch=$('channelFilter').value,cat=$('categoryFilter').value,mgr=$('managerFilter').value;return ALL.filter(r=>inDateRange(r)&&(ch==='ALL'||r.channel===ch)&&(cat==='ALL'||r.category===cat)&&(mgr==='ALL'||r.manager===mgr))}\nfunction rawFiltered(){let base=QUALITY_ROWS.length?QUALITY_ROWS:RAW_ROWS;if(!base.length)return [];let ch=$('channelFilter').value,cat=$('categoryFilter').value,mgr=$('managerFilter').value;return base.filter(r=>inDateRange(r)&&(ch==='ALL'||r.channel===ch)&&(cat==='ALL'||r.category===cat)&&(mgr==='ALL'||r.manager===mgr))}\nfunction productRows(){let base=PRODUCT_CACHE.length?PRODUCT_CACHE:RAW_ROWS;if(!base.length)return filtered();let ch=$('channelFilter').value,cat=$('categoryFilter').value,mgr=$('managerFilter').value;return base.filter(r=>inDateRange(r)&&(ch==='ALL'||!r.channel||r.channel===ch)&&(cat==='ALL'||r.category===cat)&&(mgr==='ALL'||!r.manager||r.manager===mgr))}",'filters');
  html=patch(html,/function initControls\(\)\{let ds=ALL\.map\(r=>r\.date\)\.sort\(\), latest=ds\.at\(-1\), start=latest\?latest\.slice\(0,8\)\+'01':''; if\(!\$\('dateFrom'\)\.value\)\$\('dateFrom'\)\.value=start; if\(!\$\('dateTo'\)\.value\)\$\('dateTo'\)\.value=latest; refreshFilterOptions\(\); applyTarget\(\)\}/,"function initControls(){let ds=ALL.map(r=>r.date).filter(validDateValue).sort(),earliest=ds[0]||'',latest=ds.at(-1)||'',start=latest?latest.slice(0,8)+'01':'';if(earliest){$('dateFrom').min=earliest;$('dateTo').min=earliest}if(latest){$('dateFrom').max=latest;$('dateTo').max=latest}if(!$('dateFrom').value)$('dateFrom').value=start;if(!$('dateTo').value)$('dateTo').value=latest;let b=dataBounds();clampDateInput('dateFrom',b);clampDateInput('dateTo',b);refreshFilterOptions();applyTarget()}",'init');
  html=patch(html,/let res=await fetch\(API_URL\+'\?t='\+Date\.now\(\),\{cache:'no-store',signal:controller\.signal\}\);/,"let joiner=API_URL.indexOf('?')>=0?'&':'?';\n    let res=await fetch(API_URL+joiner+'mode=cache&t='+Date.now(),{cache:'no-store',signal:controller.signal});",'fetch');
  html=patch(html,/let json=await res\.json\(\), src=Array\.isArray\(json\)\?json:\(json\.orders\|\|json\.data\|\|json\.rows\|\|\[\]\);\s*ALL=src\.map\(clean\)\.filter\(r=>r\.id&&r\.date\);/,'let json=await res.json();\n    normalizeApiResponse(json);','json');
  html=patch(html,/initControls\(\); setStatus\('','실시간 연결'\); \$\('sideStatus'\)\.textContent='Google Sheets 연결 완료'; \$\('sideMeta'\)\.textContent=`\$\{ALL\.length\.toLocaleString\('ko-KR'\)\} rows`; renderAll\(\);/,"initControls();setStatus('',DATA_MODE==='server-cache'?'요약 캐시 연결':'브라우저 캐시 렌더');$('sideStatus').textContent='Google Sheets 연결 완료';$('sideMeta').textContent=DATA_MODE==='server-cache'?`${ALL.length.toLocaleString('ko-KR')} summary rows`:`${RAW_ROWS.length.toLocaleString('ko-KR')} raw → ${ALL.length.toLocaleString('ko-KR')} summary`;renderAll();",'status');
  html=patch(html,/function renderAll\(\)\{if\(!ALL\.length\)return; refreshFilterOptions\(\); let rows=filtered\(\), target=NUM\(\$\('targetInput'\)\.value\); \$\('rangePill'\)\.textContent=`\$\{\$\('dateFrom'\)\.value\} ~ \$\{\$\('dateTo'\)\.value\}`; renderKpis\(rows,target\); renderCumulative\(rows,target\); renderChannelProgress\(rows,target\); renderDaily\(rows\); renderMoM\(rows\); renderChannelDaily\(rows\); renderProfitStructure\(rows\); renderProduct\(rows\); renderChannelTable\(rows\); renderQuality\(rows\); renderManagerPage\(rows\)\}/,"function renderAll(){if(!ALL.length)return;refreshFilterOptions();let rows=filtered(),detailRows=rawFiltered(),target=NUM($('targetInput').value);$('rangePill').textContent=`${$('dateFrom').value} ~ ${$('dateTo').value}`;renderKpis(rows,target);renderCumulative(rows,target);renderChannelProgress(rows,target);renderDaily(rows);renderMoM(rows);renderChannelDaily(rows);renderProfitStructure(rows);renderProduct(productRows());renderChannelTable(rows);renderQuality(detailRows.length?detailRows:rows);renderManagerPage(rows)}",'render');
  html=patch(html,/\$\('kRevenueSub'\)\.textContent=diff===null\?'전월 동기간 데이터 없음':`전월 동기 \$\{diff>=0\?'\+':''\}\$\{diff\.toFixed\(1\)\}%`;/,"let yoy=fixed2025RevenueForRange($('dateFrom').value,$('dateTo').value),yoyDiff=yoy?(rev-yoy)/yoy*100:null;$('kRevenueSub').textContent=yoyDiff===null?'25년 비교 기준 없음':`25년 동기간 ${KRW(yoy)} · ${yoyDiff>=0?'+':''}${yoyDiff.toFixed(1)}%`;",'yoy');
  document.open();document.write(html);document.close();
})().catch(function(e){document.body.innerHTML='<div class="boot"><div class="card"><div class="title">캐시 대시보드 로딩 실패</div><div class="sub">'+String(e.message||e).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})+'</div></div></div>'});
</script>
</body>
</html>
