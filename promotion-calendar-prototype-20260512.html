<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OURBOX 프로모션 운영 캘린더</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--ink:#17202a;--muted:#667085;--line:#d8dee8;--soft:#eef2f7;--brand:#176b87;--brand-dark:#0f4f63;--green:#18864b;--orange:#c56514;--red:#b42318;--shadow:0 14px 40px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{min-height:100vh;padding:24px}.topbar{display:grid;grid-template-columns:minmax(260px,1fr) auto;gap:16px;align-items:end;margin-bottom:18px}.eyebrow{margin:0 0 6px;color:var(--brand-dark);font-size:13px;font-weight:800}h1{margin:0;font-size:clamp(26px,3vw,40px);line-height:1.1}.subcopy{margin:10px 0 0;color:var(--muted);line-height:1.5}.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center}.month-control,.role-pill,.primary-button,.ghost-button{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);min-height:38px;padding:8px 12px;font-weight:700}.primary-button{border-color:var(--brand);background:var(--brand);color:#fff}.ghost-button:hover,.month-control:hover{background:var(--soft)}.dashboard-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:14px}.metric{min-height:96px;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:14px;box-shadow:var(--shadow)}.metric-label{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:13px;font-weight:700}.metric-value{margin-top:10px;font-size:26px;font-weight:900}.metric-note{margin-top:6px;color:var(--muted);font-size:12px}.calendar-shell{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}.calendar-grid{min-width:1180px;display:grid;grid-template-columns:repeat(7,minmax(132px,1fr)) 156px}.day-header,.week-header{position:sticky;top:0;z-index:2;min-height:44px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fbfcfe;padding:12px 10px;font-size:13px;font-weight:900;text-align:center}.week-header{border-right:0;background:#eef6f8;color:var(--brand-dark)}.day-cell{min-height:150px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff;padding:9px;transition:background .15s ease}.day-cell:hover{background:#f8fbfc}.day-cell.outside{background:#f2f4f7;color:#98a2b3}.date-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.date-number{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:900}.today .date-number{background:var(--brand);color:#fff}.add-inline{width:28px;height:28px;border:1px solid var(--line);border-radius:50%;background:#fff;color:var(--brand-dark);font-weight:900}.promo-card{border-left:4px solid var(--brand);border-radius:7px;background:#f7fbfc;margin:7px 0;padding:8px;color:var(--ink);font-size:12px}.promo-card.power-약{border-left-color:var(--green)}.promo-card.power-중{border-left-color:var(--brand)}.promo-card.power-강{border-left-color:var(--orange)}.promo-card.power-초강{border-left-color:var(--red);background:#fff7f5}.promo-title{display:flex;justify-content:space-between;gap:6px;font-weight:900;line-height:1.25}.promo-meta{margin-top:5px;color:var(--muted);line-height:1.35}.impact{flex:0 0 auto;border-radius:999px;background:var(--soft);padding:2px 6px;font-size:11px;font-weight:900}.week-total{min-height:150px;border-bottom:1px solid var(--line);background:#f2faf9;padding:12px}.week-total strong{display:block;font-size:24px;line-height:1.1;color:var(--brand-dark)}.week-total span{display:block;margin-top:6px;color:var(--muted);font-size:12px;line-height:1.4}.load-tag{display:inline-block;margin-top:10px;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900}.load-low{background:#eaf7ef;color:var(--green)}.load-mid{background:#eef6f8;color:var(--brand-dark)}.load-high{background:#fff2e8;color:var(--orange)}.load-critical{background:#ffebe8;color:var(--red)}.modal-backdrop{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.48);padding:20px}.modal-backdrop.open{display:flex}.modal{width:min(720px,100%);max-height:calc(100vh - 40px);overflow:auto;border-radius:8px;background:var(--panel);box-shadow:0 24px 80px rgba(15,23,42,.24)}.modal-header{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:18px 20px}.modal-header h2{margin:0;font-size:20px}.close-button{width:36px;height:36px;border:1px solid var(--line);border-radius:50%;background:#fff;font-size:20px;line-height:1}form{padding:20px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}label{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:10px 11px}textarea{min-height:92px;resize:vertical}.full{grid-column:1/-1}.readonly-impact{display:flex;align-items:center;min-height:42px;border:1px solid var(--line);border-radius:8px;background:var(--soft);padding:9px 11px;color:var(--ink);font-weight:900}.form-actions{display:flex;justify-content:flex-end;gap:8px;border-top:1px solid var(--line);margin:18px -20px -20px;padding:16px 20px;background:#fbfcfe}.footer-note{margin:12px 0 0;color:var(--muted);font-size:12px;line-height:1.5}@media(max-width:860px){.app{padding:16px}.topbar{grid-template-columns:1fr}.controls{justify-content:flex-start}.dashboard-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.form-grid{grid-template-columns:1fr}}@media(max-width:560px){.dashboard-strip{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="app">
<section class="topbar"><div><p class="eyebrow">OURBOX PROMOTION OPS</p><h1>월간 프로모션 운영 캘린더</h1><p class="subcopy">MD/마케팅 등록 기준으로 CS, 물류, 생산이 같은 화면에서 프로모션 기간과 예상 출고 부담을 확인합니다.</p></div><div class="controls"><button class="month-control" id="prevMonth" type="button">‹</button><strong id="currentMonthLabel" class="role-pill"></strong><button class="month-control" id="nextMonth" type="button">›</button><span class="role-pill">편집 권한: MD/마케팅</span><button class="primary-button" id="newPromotionButton" type="button">프로모션 등록</button></div></section>
<section class="dashboard-strip"><article class="metric"><div class="metric-label"><span>이번 달 프로모션</span><span>건수</span></div><div class="metric-value" id="metricCount">0건</div><div class="metric-note">등록된 기간형 이벤트 기준</div></article><article class="metric"><div class="metric-label"><span>예상 추가 출고</span><span>수량</span></div><div class="metric-value" id="metricQty">0개</div><div class="metric-note">수량 구간 기준 합계</div></article><article class="metric"><div class="metric-label"><span>가장 무거운 주차</span><span>피크</span></div><div class="metric-value" id="metricPeak">-</div><div class="metric-note" id="metricPeakNote">주차 합계 기준</div></article><article class="metric"><div class="metric-label"><span>초강 프로모션</span><span>주의</span></div><div class="metric-value" id="metricCritical">0건</div><div class="metric-note">예상 수량 2000+ 기준</div></article></section>
<section class="calendar-shell"><div class="calendar-grid" id="calendarGrid"></div></section><p class="footer-note">배포용 프로토타입입니다. 현재 데이터는 브라우저 메모리에만 저장되며 새로고침하면 샘플 데이터로 돌아갑니다.</p>
</main>
<div class="modal-backdrop" id="modalBackdrop"><section class="modal"><div class="modal-header"><h2>프로모션 등록</h2><button class="close-button" id="closeModalButton" type="button">×</button></div><form id="promotionForm"><div class="form-grid"><label class="full">프로모션명<input id="titleInput" required placeholder="예: 5월 라이브 특가"></label><label>시작일<input id="startDateInput" type="date" required></label><label>종료일<input id="endDateInput" type="date" required></label><label>상품/품목<input id="productInput" required placeholder="예: 한우 불고기 300g"></label><label>채널<select id="channelInput"><option>자사몰</option><option>네이버</option><option>카카오</option><option>공구</option><option>폐쇄몰</option></select></label><label>프로모션 유형<select id="typeInput"><option>라이브</option><option>쿠폰</option><option>공구</option><option>특가</option><option>기획전</option></select></label><label>예상 수량<select id="quantityInput"><option value="200">200개</option><option value="500">500개</option><option value="1000">1000개</option><option value="2000+">2000개+</option></select></label><label>프로모션 파워<span class="readonly-impact" id="impactPreview">약</span></label><label>담당자<input id="ownerInput" required placeholder="예: 김MD"></label><label class="full">운영 메모<textarea id="memoInput" placeholder="CS/물류/생산이 알아야 할 내용"></textarea></label></div><div class="form-actions"><button class="ghost-button" id="resetFormButton" type="button">초기화</button><button class="primary-button" type="submit">등록</button></div></form></section></div>
<script>
var Logic={toDate:function(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2])},toKey:function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')},add:function(d,n){var x=new Date(d.getFullYear(),d.getMonth(),d.getDate());x.setDate(x.getDate()+n);return x},qty:function(t){return t==='2000+'?2000:Number(t)},impact:function(t){var q=this.qty(t);return q>=2000?'초강':q>=1000?'강':q>=500?'중':'약'},range:function(a,b){var c=this.toDate(a),e=this.toDate(b),r=[];while(c<=e){r.push(this.toKey(c));c=this.add(c,1)}return r},weeks:function(y,m){var f=new Date(y,m,1),l=new Date(y,m+1,0),c=this.add(f,-f.getDay()),e=this.add(l,6-l.getDay()),w=[];while(c<=e){var row=[];for(var i=0;i<7;i++){row.push(this.toKey(c));c=this.add(c,1)}w.push(row)}return w},active:function(p,k){return p.start_date<=k&&p.end_date>=k},alloc:function(p,weeks){var dates=this.range(p.start_date,p.end_date),daily=this.qty(p.expected_qty_tier)/dates.length,set=new Set(dates);return weeks.map(function(w){return Math.round(w.filter(function(k){return set.has(k)}).length*daily)})}};
var state={visibleDate:new Date(2026,4,1),promotions:[{id:'p1',title:'어버이날 한우 특가',start_date:'2026-05-04',end_date:'2026-05-08',product_name:'한우 구이세트',channel:'자사몰',promo_type:'특가',expected_qty_tier:'1000',impact_level:'강',owner:'김MD',memo:'선물 수요 집중. CS 문의와 포장재 재고 확인 필요.'},{id:'p2',title:'카카오 공구 마감',start_date:'2026-05-10',end_date:'2026-05-12',product_name:'닭가슴살 패키지',channel:'카카오',promo_type:'공구',expected_qty_tier:'500',impact_level:'중',owner:'박마케터',memo:'마감 후 출고 몰림. 13일 오전 송장 처리량 확인.'},{id:'p3',title:'네이버 라이브',start_date:'2026-05-20',end_date:'2026-05-22',product_name:'돼지 양념구이',channel:'네이버',promo_type:'라이브',expected_qty_tier:'2000+',impact_level:'초강',owner:'이마케터',memo:'추가 생산 여부 사전 결정 필요. 냉장 출고 CAPA 확인.'}]};
var grid=document.getElementById('calendarGrid'),modal=document.getElementById('modalBackdrop'),form=document.getElementById('promotionForm'),qty=document.getElementById('quantityInput'),impact=document.getElementById('impactPreview'),start=document.getElementById('startDateInput'),end=document.getElementById('endDateInput');
function el(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e}function num(v){return v.toLocaleString('ko-KR')}function visible(){var y=state.visibleDate.getFullYear(),m=state.visibleDate.getMonth(),a=Logic.toKey(new Date(y,m,1)),b=Logic.toKey(new Date(y,m+1,0));return state.promotions.filter(function(p){return p.end_date>=a&&p.start_date<=b})}function weekTotal(w,i,weeks){return state.promotions.reduce(function(s,p){return s+Logic.alloc(p,weeks)[i]},0)}function load(t){return t>=1800?['load-critical','초과 주의']:t>=1000?['load-high','높음']:t>=500?['load-mid','보통']:['load-low','낮음']}function metrics(weeks){var vp=visible(),tq=vp.reduce(function(s,p){return s+Logic.qty(p.expected_qty_tier)},0),wt=weeks.map(weekTotal),peak=Math.max.apply(null,wt.concat([0])),pi=wt.indexOf(peak),crit=vp.filter(function(p){return p.impact_level==='초강'}).length;metricCount.textContent=vp.length+'건';metricQty.textContent=num(tq)+'개';metricPeak.textContent=peak?num(peak)+'개':'-';metricPeakNote.textContent=peak?(pi+1)+'주차 예상 출고':'주차 합계 기준';metricCritical.textContent=crit+'건'}
function card(p){var c=el('article','promo-card power-'+p.impact_level),t=el('div','promo-title');t.appendChild(el('span','',p.title));t.appendChild(el('span','impact',p.impact_level));c.appendChild(t);c.appendChild(el('div','promo-meta',p.channel+' · '+p.promo_type+' · '+p.expected_qty_tier+'개'));c.appendChild(el('div','promo-meta',p.product_name+' · '+p.owner));return c}function totalBox(w,i,weeks){var t=weekTotal(w,i,weeks),l=load(t),b=el('div','week-total');b.appendChild(el('strong','',num(t)));b.appendChild(el('span','',(i+1)+'주차 예상 추가 출고'));b.appendChild(el('em','load-tag '+l[0],l[1]));return b}
function render(){var y=state.visibleDate.getFullYear(),m=state.visibleDate.getMonth(),weeks=Logic.weeks(y,m),today=Logic.toKey(new Date()),days=['일','월','화','수','목','금','토'];currentMonthLabel.textContent=y+'년 '+(m+1)+'월';grid.innerHTML='';days.forEach(function(d){grid.appendChild(el('div','day-header',d))});grid.appendChild(el('div','week-header','주차 합계'));weeks.forEach(function(w,wi){w.forEach(function(k){var d=Logic.toDate(k),cell=el('div','day-cell'+(d.getMonth()!==m?' outside':'')+(k===today?' today':''));cell.onclick=function(){openModal(k)};var row=el('div','date-row');row.appendChild(el('span','date-number',String(d.getDate())));row.appendChild(el('span','add-inline','+'));cell.appendChild(row);state.promotions.filter(function(p){return Logic.active(p,k)}).forEach(function(p){cell.appendChild(card(p))});grid.appendChild(cell)});grid.appendChild(totalBox(w,wi,weeks))});metrics(weeks)}
function openModal(k){form.reset();start.value=k||Logic.toKey(new Date());end.value=k||Logic.toKey(new Date());impact.textContent='약';modal.classList.add('open')}function closeModal(){modal.classList.remove('open')}qty.onchange=function(){impact.textContent=Logic.impact(qty.value)};closeModalButton.onclick=closeModal;resetFormButton.onclick=function(){form.reset();impact.textContent='약'};newPromotionButton.onclick=function(){openModal()};prevMonth.onclick=function(){state.visibleDate.setMonth(state.visibleDate.getMonth()-1);render()};nextMonth.onclick=function(){state.visibleDate.setMonth(state.visibleDate.getMonth()+1);render()};form.onsubmit=function(e){e.preventDefault();if(start.value>end.value){alert('종료일은 시작일 이후여야 합니다.');return}state.promotions.push({id:'p'+Date.now(),title:titleInput.value,start_date:start.value,end_date:end.value,product_name:productInput.value,channel:channelInput.value,promo_type:typeInput.value,expected_qty_tier:qty.value,impact_level:Logic.impact(qty.value),owner:ownerInput.value,memo:memoInput.value});closeModal();render()};render();
</script>
</body>
</html>
